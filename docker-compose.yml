version: '3.8'

services:
  db:
    image: mysql:5.6
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: thingspeak_development
      MYSQL_USER: thing
      MYSQL_PASSWORD: speak
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_USER: thing
      DATABASE_PASSWORD: speak

volumes:
  mysql_data:
